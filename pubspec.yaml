name: omni_kv_workspace
description: The monorepo for OmniKV and its adapter packages.
publish_to: none

environment:
  sdk: ^3.11.0

workspace:
  - example
  - packages/*

dev_dependencies:
  melos: ^8.2.0
  test: ^1.30.0
  very_good_analysis: ^10.3.0

melos:
  categories:
    packages:
      - packages/**
    examples:
      - example

  scripts:
    format:apply:
      run: dart format .
      description: Format all Dart files.

    format:check:
      run: dart format --output=none --set-exit-if-changed .
      description: Check formatting.

    analyze:
      run: melos exec -- dart analyze .
      description: Analyze all packages.

    test:
      run: melos run test:dart && melos run test:flutter
      description: Run all tests in the workspace correctly.

    test:dart:
      run: melos exec --dir-exists=test --no-flutter -- dart test
      description: Run tests for pure Dart packages.

    test:flutter:
      run: melos exec --dir-exists=test --flutter -- flutter test
      description: Run tests for Flutter packages.

    publish:dry-run:
      run: melos exec --no-private -- dart pub publish --dry-run
      description: Run pub publish dry-run for publishable packages.

    doctor:
      run: melos exec -- dart pub deps
      description: Print dependency resolution for every workspace package.
