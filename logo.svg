<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
    <defs>
        <!-- Flutter Blue Gradient for "Omni" -->
        <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#01579B" />
            <stop offset="100%" stop-color="#29B6F6" />
        </linearGradient>

        <!-- Warm Orange Gradient for the "Key" -->
        <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF5722" />
            <stop offset="100%" stop-color="#FF8A65" />
        </linearGradient>
    </defs>

    <!-- Abstract Icon -->
    <g transform="translate(15, 10)">
        <!-- The "O" ring representing 'Omni' & Universal Adapters -->
        <circle cx="50" cy="50" r="40" fill="none" stroke="url(#blueGrad)" stroke-width="16" />

        <!-- The Key intersecting the O -->
        <path d="M 70 50 L 115 50 L 115 75 L 100 75 L 100 90 L 85 90 L 85 50" fill="none" stroke="url(#orangeGrad)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" />
        <circle cx="50" cy="50" r="10" fill="url(#orangeGrad)" />
    </g>

    <!-- OmniKV Typography -->
    <text x="150" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="76" font-weight="900" fill="#2C3E50" letter-spacing="-1.5">
        Omni<tspan fill="url(#blueGrad)">KV</tspan>
    </text>
</svg>